<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard IWD · Yanti</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mustard: #FCB528;
    --mustard-dim: rgba(252,181,40,0.12);
    --blue: #005287;
    --bg: #0B0E16;
    --bar: #12151F;
    --border: rgba(255,255,255,0.07);
    --muted: rgba(255,255,255,0.28);
    --dot-hi:  #FCB528;
    --dot-tim: #4B96F3;
    --dot-ov:  #3DBD76;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ══ TOP BAR ══ */
  .topbar {
    position: relative;
    display: flex;
    align-items: center;
    height: 56px;
    background: var(--bar);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 24px;
  }

  /* mustard accent line */
  .topbar::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--mustard) 0%, transparent 50%);
    opacity: 0.4;
  }

  /* ── Brand (left) ── */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    width: 160px;
  }

  .brand-icon {
    width: 30px; height: 30px;
    background: var(--mustard);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .brand-icon svg { width: 15px; height: 15px; }

  .brand-label {
    display: flex; flex-direction: column; gap: 1px;
  }
  .brand-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--mustard);
    line-height: 1;
  }
  .brand-sub {
    font-size: 9.5px; font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1;
  }

  /* ── Center tabs ── */
  .tabs-center {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 5px;
  }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 20px;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    transition: all 0.18s ease;
    white-space: nowrap;
  }

  .tab-btn:hover {
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.06);
  }

  .tab-btn.active {
    color: #0B0E16;
    background: var(--mustard);
    box-shadow: 0 2px 12px rgba(252,181,40,0.35);
  }

  .tab-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.18s;
  }

  .tab-btn.active .tab-dot { background: rgba(0,0,0,0.45); }
  .tab-hi  .tab-dot { background: var(--dot-hi); }
  .tab-tim .tab-dot { background: var(--dot-tim); }
  .tab-ov  .tab-dot { background: var(--dot-ov); }

  /* ── Right meta ── */
  .bar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    width: 160px;
    justify-content: flex-end;
  }

  .sync-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
  }
  .sync-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--dot-ov);
    flex-shrink: 0;
  }
  .sync-txt {
    font-size: 10px; font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .clock {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* ══ IFRAME ══ */
  .frames {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
  }

  iframe.active {
    opacity: 1;
    pointer-events: auto;
  }
</style>
</head>
<body>

<div class="topbar">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="9,1 3.5,8 7,8 6,14 11.5,7 8,7" fill="#0B0E16"/>
      </svg>
    </div>
    <div class="brand-label">
      <div class="brand-name">IWDemy</div>
      <div class="brand-sub">Ruang Kerja · Yanti</div>
    </div>
  </div>

  <div class="tabs-center">
    <div class="tab-btn tab-hi active" id="tab-hari-ini" onclick="switchTab('hari-ini')">
      <span class="tab-dot"></span>Hari Ini
    </div>
    <div class="tab-btn tab-tim" id="tab-tim" onclick="switchTab('tim')">
      <span class="tab-dot"></span>Tim
    </div>
    <div class="tab-btn tab-ov" id="tab-overview" onclick="switchTab('overview')">
      <span class="tab-dot"></span>Overview
    </div>
  </div>

  <div class="bar-right">
    <div class="sync-pill">
      <div class="sync-dot"></div>
      <div class="sync-txt" id="sync-label">–</div>
    </div>
    <div class="clock" id="clock">–</div>
  </div>

</div>

<div class="frames">
  <iframe id="frame-hari-ini"
    src="https://iwdemy.github.io/ops-b4k9x2/dashboard-hari-ini--v1.html?person=yanti&embed=1"
    class="active"
    onload="onFrameLoad(this)">
  </iframe>
  <iframe id="frame-tim"
    data-src="https://iwdemy.github.io/ops-b4k9x2/dashboard-tim--v1.html?embed=1">
  </iframe>
  <iframe id="frame-overview"
    data-src="https://iwdemy.github.io/ops-b4k9x2/dashboard-overview--v1.html?embed=1">
  </iframe>
</div>

<script>
  let loaded = { 'hari-ini': false, tim: false, overview: false };
  let activeTab = 'hari-ini';

  // clock
  (function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    setTimeout(tick, 30000);
  })();

  // sync label
  function updateSync(frame) {
    try {
      const ts = frame.contentWindow.SYNC_TIME || frame.contentWindow.OV_SYNC;
      if (ts) {
        const d = new Date(ts);
        document.getElementById('sync-label').textContent =
          'Sync ' + d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}) + ' ' +
          d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
      }
    } catch(e) { document.getElementById('sync-label').textContent = 'Live'; }
  }

  function onFrameLoad(frame) {
    try { loaded[frame.id.replace('frame-','')] = true; updateSync(frame); } catch(e) {}
  }

  function switchTab(key) {
    if (activeTab === key) return;
    activeTab = key;

    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + key).classList.add('active');

    document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
    const frame = document.getElementById('frame-' + key);
    frame.classList.add('active');

    if (!loaded[key] && frame.dataset.src) {
      frame.src = frame.dataset.src;
      frame.onload = () => { loaded[key] = true; onFrameLoad(frame); };
    }
  }
</script>
</body>
</html>
