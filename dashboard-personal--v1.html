<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Personal · IWDemy</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --mustard:#FCB528; --mustard-10:rgba(252,181,40,.10); --mustard-20:rgba(252,181,40,.26);
  --mustard-dark:#B8850A;
  --blue:#005287; --blue-08:rgba(0,82,135,.08); --blue-15:rgba(0,82,135,.15);
  --green:#1B8040; --green-08:rgba(27,128,64,.08);
  --maroon:#660000; --maroon-08:rgba(102,0,0,.08);
  --orange:#D06A00; --orange-08:rgba(208,106,0,.08);
  --red:#C0392B; --red-08:rgba(192,57,43,.08);
  --ink:#111; --grey:#6A6A6A; --silver:#EFEFEF; --fog:#F7F7F5; --white:#FFF;
  --xs:0 1px 3px rgba(0,0,0,.06); --sm:0 2px 8px rgba(0,0,0,.08); --md:0 6px 24px rgba(0,0,0,.10);
  --rsm:8px; --rmd:12px; --rlg:16px; --rxl:24px;
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Carlito','Inter',sans-serif;background:var(--fog);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative}

/* BG BLOBS */
.bg-blobs{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-blobs::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(252,181,40,.13) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%}
.bg-blobs::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(0,82,135,.09) 0%,transparent 70%);bottom:50px;left:-50px;border-radius:50%}

.wrap{max-width:1100px;margin:0 auto;padding:24px 20px;position:relative;z-index:1}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:14px}
.logo-pair{display:flex;align-items:center;gap:8px}
.logo-pair img{height:32px;object-fit:contain}
.logo-divider{width:1px;height:24px;background:var(--silver)}
.header-title h1{font-family:'Montserrat',sans-serif;font-size:1.1rem;font-weight:700;color:var(--ink)}
.header-title p{font-size:.8rem;color:var(--grey);margin-top:1px}
.header-date{font-size:.8rem;color:var(--grey);text-align:right;background:var(--white);border:1px solid var(--silver);padding:6px 14px;border-radius:20px;box-shadow:var(--xs)}

/* PERSON TABS */
.person-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab-btn{position:relative;display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:24px;border:2px solid var(--silver);background:var(--white);cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;color:var(--grey);transition:all .2s;box-shadow:var(--xs)}
.tab-btn:hover{border-color:var(--mustard);color:var(--mustard-dark)}
.tab-btn.active{background:var(--mustard);border-color:var(--mustard);color:var(--white);box-shadow:0 4px 12px rgba(252,181,40,.35)}
.tab-avatar{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
.tab-btn:not(.active) .tab-avatar{background:var(--silver);color:var(--ink)}
.tab-count{font-size:.7rem;background:rgba(255,255,255,.4);padding:1px 6px;border-radius:10px;font-weight:700}
.tab-btn:not(.active) .tab-count{background:var(--silver);color:var(--grey)}
.p1-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--white)}

/* PERSON VIEW */
.person-view{display:none}
.person-view.active{display:block}

/* NARRATIVE CARD */
.narrative-card{background:linear-gradient(135deg,var(--blue) 0%,#0077b6 60%,#0096c7 100%);border-radius:var(--rlg);padding:20px 24px;margin-bottom:24px;color:var(--white);box-shadow:0 8px 28px rgba(0,82,135,.22)}
.narrative-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.narrative-icon{font-size:1.4rem}
.narrative-title{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:700;opacity:.9}
.narrative-text{font-size:.95rem;line-height:1.7;opacity:.92}
.narrative-stats{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.stat-chip{background:rgba(255,255,255,.18);border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:6px}
.stat-chip .stat-num{font-family:'Montserrat',sans-serif;font-size:1.05rem;font-weight:800}

/* KANBAN BOARD */
.kanban-board{display:grid;gap:16px;margin-bottom:32px}
.kanban-board.timeline{grid-template-columns:repeat(4,1fr)}
.kanban-board.priority{grid-template-columns:repeat(3,1fr)}

@media(max-width:900px){
  .kanban-board.timeline{grid-template-columns:repeat(2,1fr)}
  .kanban-board.priority{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:540px){
  .kanban-board.timeline,.kanban-board.priority{grid-template-columns:1fr}
}

/* KANBAN COLUMN */
.kanban-col{background:var(--white);border-radius:var(--rlg);box-shadow:var(--sm);overflow:hidden;display:flex;flex-direction:column}
.col-header{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--silver)}
.col-header-left{display:flex;align-items:center;gap:8px}
.col-icon{font-size:1.1rem}
.col-title{font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:700;color:var(--ink)}
.col-badge{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--silver);color:var(--grey)}

/* Column accent colors */
.col-haini .col-header{border-bottom-color:var(--mustard);background:linear-gradient(135deg,rgba(252,181,40,.06),var(--white))}
.col-haini .col-badge{background:var(--mustard-10);color:var(--mustard-dark)}
.col-besok .col-header{border-bottom-color:var(--blue);background:linear-gradient(135deg,var(--blue-08),var(--white))}
.col-besok .col-badge{background:var(--blue-15);color:var(--blue)}
.col-minggu .col-header{border-bottom-color:var(--green);background:linear-gradient(135deg,var(--green-08),var(--white))}
.col-minggu .col-badge{background:var(--green-08);color:var(--green)}
.col-menunggu .col-header{border-bottom-color:var(--silver)}
.col-p1 .col-header{border-bottom-color:var(--red);background:linear-gradient(135deg,var(--red-08),var(--white))}
.col-p1 .col-badge{background:var(--red-08);color:var(--red)}
.col-p2 .col-header{border-bottom-color:var(--orange);background:linear-gradient(135deg,var(--orange-08),var(--white))}
.col-p2 .col-badge{background:var(--orange-08);color:var(--orange)}
.col-p3 .col-header{border-bottom-color:var(--green);background:linear-gradient(135deg,var(--green-08),var(--white))}
.col-p3 .col-badge{background:var(--green-08);color:var(--green)}

/* KANBAN CARDS */
.col-cards{padding:10px 10px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:60px}
.kanban-card{background:var(--fog);border-radius:var(--rsm);padding:10px 12px;border-left:3px solid transparent;cursor:default;transition:transform .15s,box-shadow .15s}
.kanban-card:hover{transform:translateY(-1px);box-shadow:var(--sm)}
.col-haini .kanban-card{border-left-color:var(--mustard)}
.col-besok .kanban-card{border-left-color:var(--blue)}
.col-minggu .kanban-card{border-left-color:var(--green)}
.col-menunggu .kanban-card{border-left-color:var(--silver)}
.col-p1 .kanban-card{border-left-color:var(--red)}
.col-p2 .kanban-card{border-left-color:var(--orange)}
.col-p3 .kanban-card{border-left-color:var(--green)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:7px}
.card-name{font-size:.83rem;font-weight:600;color:var(--ink);line-height:1.45;flex:1}
.card-notion-link{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--silver);color:var(--grey);text-decoration:none;font-size:.75rem;transition:background .15s,color .15s;margin-top:1px}
.card-notion-link:hover{background:var(--blue-15);color:var(--blue)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap}
.tag-priority-p1{background:var(--red-08);color:var(--red)}
.tag-priority-p2{background:var(--orange-08);color:var(--orange)}
.tag-priority-p3{background:var(--green-08);color:var(--green)}
.tag-status-doing{background:var(--mustard-10);color:var(--mustard-dark)}
.tag-status-next{background:var(--blue-08);color:var(--blue)}
.tag-status-waiting{background:var(--silver);color:var(--grey)}
.tag-status-done{background:var(--green-08);color:var(--green)}
.tag-domain{background:rgba(102,0,0,.07);color:var(--maroon)}
.tag-due{background:var(--blue-08);color:var(--blue)}
.tag-overdue{background:var(--red-08);color:var(--red)}
.tag-assignee{background:var(--mustard-10);color:var(--mustard-dark)}

.col-empty{text-align:center;padding:20px 10px;color:var(--grey);font-size:.8rem;font-style:italic;opacity:.7}

/* SYNC INFO */
.sync-bar{text-align:center;font-size:.75rem;color:var(--grey);margin-top:8px;padding:8px;border-top:1px solid var(--silver)}
</style>
</head>
<body>
<div class="bg-blobs"></div>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo-pair">
        <img src="./logo-iwdemy.jpg" alt="IWDemy">
        <div class="logo-divider"></div>
        <img src="./logo-tjitra.jpg" alt="Tjitra">
      </div>
      <div class="header-title">
        <h1>Dashboard Personal</h1>
        <p>Kanban · Insight Web Academy</p>
      </div>
    </div>
    <div class="header-date" id="headerDate">Memuat...</div>
  </div>

  <!-- PERSON TABS -->
  <div class="person-tabs" id="personTabs"></div>

  <!-- PERSON VIEWS (rendered by JS) -->
  <div id="personViews"></div>

  <div class="sync-bar" id="syncBar">Memuat data...</div>
</div>

<script>
// ─────────────────────────────────────────────
// AUTO:START — NOTION SYNC DATA
const USERS = {
  kristina: '4ee75f0d-4dc7-483f-8b3b-a0965365c77a',
  juli:     'd9f6882d-73e7-4749-85cd-56b0f90f7cf1',
  meliana:  '01ee5cb8-5b07-4ffa-821d-deed6134e5b9',
  anita:    '4b515780-3208-493a-a95e-1584c9f376ec',
  stephen:  'bbfcd9ba-60c0-43bf-8f95-3dcae01b571e',
};
const TASKS = [];
const SYNC_TIME = '2026-04-21T04:00:00';
// AUTO:END — NOTION SYNC DATA
// ─────────────────────────────────────────────

// ── CONFIG ──────────────────────────────────
const PERSONS = [
  { key:'kristina', label:'Kristina', initials:'KR', role:'manager' },
  { key:'juli',     label:'Juli',     initials:'JL', domain:'Local AI' },
  { key:'meliana',  label:'Meliana',  initials:'ML', domain:'IDL' },
  { key:'anita',    label:'Anita',    initials:'AN', domain:'Event' },
  { key:'stephen',  label:'Stephen',  initials:'ST', domain:'Multimodal' },
];

const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const TOMORROW = new Date(TODAY); TOMORROW.setDate(TODAY.getDate()+1);
const END_OF_WEEK = new Date(TODAY); END_OF_WEEK.setDate(TODAY.getDate()+7);

// ── HELPERS ─────────────────────────────────
function tasksByPerson(personKey) {
  const uid = USERS[personKey];
  return TASKS.filter(t => t.assignee === uid || t.assignee === personKey);
}

function dueColumn(task) {
  if (!task.due) return 'menunggu';
  const d = new Date(task.due); d.setHours(0,0,0,0);
  if (d < TODAY) return 'haini'; // overdue → treat as urgent today
  if (d.getTime() === TODAY.getTime()) return 'haini';
  if (d.getTime() === TOMORROW.getTime()) return 'besok';
  if (d <= END_OF_WEEK) return 'minggu';
  return 'menunggu';
}

function priorityCol(task) {
  const p = (task.priority || '').toLowerCase();
  if (p.includes('p1') || p.includes('high') || p.includes('tinggi')) return 'p1';
  if (p.includes('p2') || p.includes('med')) return 'p2';
  return 'p3';
}

function priorityTag(p) {
  const lp = (p||'').toLowerCase();
  if (lp.includes('p1')||lp.includes('high')||lp.includes('tinggi')) return ['P1','tag-priority-p1'];
  if (lp.includes('p2')||lp.includes('med')) return ['P2','tag-priority-p2'];
  return ['P3','tag-priority-p3'];
}

function statusTag(s) {
  const ls = (s||'').toLowerCase();
  if (ls.includes('doing')||ls.includes('progress')||ls.includes('berjalan')) return ['● Doing','tag-status-doing'];
  if (ls.includes('next')||ls.includes('rencana')||ls.includes('todo')) return ['○ Next','tag-status-next'];
  if (ls.includes('done')||ls.includes('selesai')) return ['✓ Done','tag-status-done'];
  return ['◌ Waiting','tag-status-waiting'];
}

function fmtDue(task) {
  if (!task.due) return null;
  const d = new Date(task.due); d.setHours(0,0,0,0);
  const diff = Math.round((d-TODAY)/(1000*60*60*24));
  if (diff < 0) return [`Telat ${Math.abs(diff)}h`, 'tag-overdue'];
  if (diff === 0) return ['Hari ini', 'tag-due'];
  if (diff === 1) return ['Besok', 'tag-due'];
  return [`+${diff} hari`, 'tag-due'];
}

function nameOf(uid) {
  for (const [k,v] of Object.entries(USERS)) {
    if (v === uid || k === uid) return k.charAt(0).toUpperCase()+k.slice(1);
  }
  return '?';
}

// ── NARRATIVE ───────────────────────────────
function buildNarrative(personKey, tasks) {
  const name = PERSONS.find(p=>p.key===personKey)?.label || personKey;
  const total = tasks.length;
  if (total === 0) return `${name} belum memiliki task aktif hari ini. Saatnya merencanakan langkah berikutnya.`;

  const doing = tasks.filter(t=>(t.status||'').toLowerCase().includes('doing')||(t.status||'').toLowerCase().includes('progress'));
  const dueToday = tasks.filter(t=>dueColumn(t)==='haini');
  const p1 = tasks.filter(t=>priorityCol(t)==='p1');

  let story = '';
  if (personKey === 'kristina') {
    // Manager narrative
    story = `Tim memiliki ${total} task aktif. `;
    if (p1.length > 0) story += `Terdapat ${p1.length} task P1 yang perlu perhatian segera: ${p1.slice(0,2).map(t=>'"'+t.name+'"').join(', ')}${p1.length>2?' dan lainnya':''}. `;
    if (dueToday.length > 0) story += `${dueToday.length} task jatuh tempo hari ini.`;
    else story += `Tidak ada task yang jatuh tempo hari ini.`;
  } else {
    const domain = PERSONS.find(p=>p.key===personKey)?.domain || '';
    story = `${name} mengelola ${total} task aktif di area ${domain}. `;
    if (doing.length > 0) story += `Sedang dikerjakan: ${doing.slice(0,2).map(t=>'"'+t.name+'"').join(' dan ')}${doing.length>2?' (dan lainnya)':''}. `;
    if (dueToday.length > 0) story += `${dueToday.length} item perlu diselesaikan hari ini.`;
    else if (total > 0) story += `Tidak ada deadline hari ini — fokus pada pipeline berikutnya.`;
  }
  return story.trim();
}

// ── CARD HTML ───────────────────────────────
function cardHTML(task, showAssignee) {
  const [pLabel, pClass] = priorityTag(task.priority);
  const [sLabel, sClass] = statusTag(task.status);
  const due = fmtDue(task);
  const notionLink = task.url
    ? `<a class="card-notion-link" href="${task.url}" target="_blank" title="Buka di Notion">↗</a>`
    : '';
  return `
    <div class="kanban-card">
      <div class="card-top">
        <div class="card-name">${task.name}</div>
        ${notionLink}
      </div>
      <div class="card-tags">
        <span class="tag ${pClass}">${pLabel}</span>
        <span class="tag ${sClass}">${sLabel}</span>
        ${task.domain ? `<span class="tag tag-domain">${task.domain}</span>` : ''}
        ${due ? `<span class="tag ${due[1]}">${due[0]}</span>` : ''}
        ${showAssignee && task.assignee ? `<span class="tag tag-assignee">${nameOf(task.assignee)}</span>` : ''}
      </div>
    </div>`;
}

// ── TIMELINE KANBAN (team members) ──────────
function renderTimeline(personKey) {
  const tasks = tasksByPerson(personKey);
  const cols = {haini:[],besok:[],minggu:[],menunggu:[]};
  tasks.forEach(t => cols[dueColumn(t)].push(t));

  const colDef = [
    {key:'haini',   cls:'col-haini',   icon:'🔥', title:'Hari Ini'},
    {key:'besok',   cls:'col-besok',   icon:'⚡', title:'Besok'},
    {key:'minggu',  cls:'col-minggu',  icon:'📅', title:'Minggu Ini'},
    {key:'menunggu',cls:'col-menunggu',icon:'🕐', title:'Menunggu'},
  ];

  const narrative = buildNarrative(personKey, tasks);
  const stats = {
    total: tasks.length,
    doing: tasks.filter(t=>(t.status||'').toLowerCase().includes('doing')||(t.status||'').toLowerCase().includes('progress')).length,
    dueToday: cols.haini.length,
  };

  let html = `
    <div class="narrative-card">
      <div class="narrative-header">
        <span class="narrative-icon">📖</span>
        <span class="narrative-title">Cerita Hari Ini</span>
      </div>
      <div class="narrative-text">${narrative}</div>
      <div class="narrative-stats">
        <div class="stat-chip"><span class="stat-num">${stats.total}</span> Total Task</div>
        <div class="stat-chip"><span class="stat-num">${stats.doing}</span> Sedang Dikerjakan</div>
        <div class="stat-chip"><span class="stat-num">${stats.dueToday}</span> Hari Ini</div>
      </div>
    </div>
    <div class="kanban-board timeline">`;

  colDef.forEach(c => {
    const items = cols[c.key];
    html += `
      <div class="kanban-col ${c.cls}">
        <div class="col-header">
          <div class="col-header-left">
            <span class="col-icon">${c.icon}</span>
            <span class="col-title">${c.title}</span>
          </div>
          <span class="col-badge">${items.length}</span>
        </div>
        <div class="col-cards">
          ${items.length === 0 ? '<div class="col-empty">Kosong</div>' : items.map(t=>cardHTML(t,false)).join('')}
        </div>
      </div>`;
  });

  html += `</div>`;
  return html;
}

// ── PRIORITY COMMAND BOARD (Kristina) ───────
function renderPriorityBoard() {
  // Show ALL tasks for manager view
  const tasks = TASKS.filter(t=>t.status && !(t.status||'').toLowerCase().includes('done'));
  const cols = {p1:[],p2:[],p3:[]};
  tasks.forEach(t => cols[priorityCol(t)].push(t));

  const colDef = [
    {key:'p1', cls:'col-p1', icon:'🎯', title:'P1 — Kritis'},
    {key:'p2', cls:'col-p2', icon:'⚡', title:'P2 — Penting'},
    {key:'p3', cls:'col-p3', icon:'🌿', title:'P3 — Pipeline'},
  ];

  const narrative = buildNarrative('kristina', tasks);
  const stats = {
    total: tasks.length,
    p1: cols.p1.length,
    dueToday: tasks.filter(t=>dueColumn(t)==='haini').length,
  };

  let html = `
    <div class="narrative-card">
      <div class="narrative-header">
        <span class="narrative-icon">🧭</span>
        <span class="narrative-title">Command View — Tim IWDemy</span>
      </div>
      <div class="narrative-text">${narrative}</div>
      <div class="narrative-stats">
        <div class="stat-chip"><span class="stat-num">${stats.total}</span> Task Aktif</div>
        <div class="stat-chip"><span class="stat-num">${stats.p1}</span> P1 Kritis</div>
        <div class="stat-chip"><span class="stat-num">${stats.dueToday}</span> Due Hari Ini</div>
      </div>
    </div>
    <div class="kanban-board priority">`;

  colDef.forEach(c => {
    const items = cols[c.key];
    html += `
      <div class="kanban-col ${c.cls}">
        <div class="col-header">
          <div class="col-header-left">
            <span class="col-icon">${c.icon}</span>
            <span class="col-title">${c.title}</span>
          </div>
          <span class="col-badge">${items.length}</span>
        </div>
        <div class="col-cards">
          ${items.length === 0 ? '<div class="col-empty">Bersih 👌</div>' : items.map(t=>cardHTML(t,true)).join('')}
        </div>
      </div>`;
  });

  html += `</div>`;
  return html;
}

// ── MAIN RENDER ─────────────────────────────
function countP1(personKey) {
  const tasks = personKey === 'kristina'
    ? TASKS.filter(t=>!(t.status||'').toLowerCase().includes('done'))
    : tasksByPerson(personKey);
  return tasks.filter(t=>priorityCol(t)==='p1').length;
}

function countTasks(personKey) {
  if (personKey === 'kristina') return TASKS.filter(t=>!(t.status||'').toLowerCase().includes('done')).length;
  return tasksByPerson(personKey).length;
}

function render() {
  // Header date
  const opts = {weekday:'long',day:'numeric',month:'long',year:'numeric'};
  document.getElementById('headerDate').textContent = TODAY.toLocaleDateString('id-ID',opts);

  // Build tabs
  const tabsEl = document.getElementById('personTabs');
  const viewsEl = document.getElementById('personViews');
  tabsEl.innerHTML = '';
  viewsEl.innerHTML = '';

  PERSONS.forEach(p => {
    const n = countTasks(p.key);
    const p1 = countP1(p.key);

    // Tab
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.person = p.key;
    btn.innerHTML = `
      <span class="tab-avatar">${p.initials}</span>
      ${p.label}
      <span class="tab-count">${n}</span>
      ${p1 > 0 ? '<span class="p1-dot"></span>' : ''}`;
    btn.addEventListener('click', () => switchTo(p.key));
    tabsEl.appendChild(btn);

    // View container
    const div = document.createElement('div');
    div.className = 'person-view';
    div.id = `view-${p.key}`;
    div.innerHTML = p.key === 'kristina' ? renderPriorityBoard() : renderTimeline(p.key);
    viewsEl.appendChild(div);
  });

  // Sync bar
  const st = new Date(SYNC_TIME);
  document.getElementById('syncBar').textContent = `Data diperbarui: ${st.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})} pukul ${st.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})} WIB`;

  // Activate from hash or default
  const hash = location.hash.replace('#','');
  const valid = PERSONS.find(p=>p.key===hash);
  switchTo(valid ? hash : PERSONS[0].key);
}

function switchTo(personKey) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.person === personKey);
  });
  document.querySelectorAll('.person-view').forEach(v => {
    v.classList.toggle('active', v.id === `view-${personKey}`);
  });
  history.replaceState(null,'',`#${personKey}`);
}

render();
</script>
</body>
</html>
