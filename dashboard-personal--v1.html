<style>
:root{
  --bg:#F7F7F5;--card:#FFFFFF;
  --mustard:#FCB528;--mustard-d:#8A6200;--mustard-s:rgba(252,181,40,.10);
  --orange:#D06A00;--orange-s:rgba(208,106,0,.08);
  --green:#1B8040;--green-s:rgba(27,128,64,.08);
  --red:#C0392B;--red-s:rgba(192,57,43,.10);
  --maroon:#660000;
  --blue:#005287;--blue-s:rgba(0,82,135,.08);
  --t1:rgba(14,14,14,.92);--t2:rgba(30,28,24,.68);--t3:rgba(30,28,24,.50);
  --border:rgba(30,28,24,.09);--r:10px;
  --sh:0 1px 3px rgba(20,20,18,.04),0 4px 12px rgba(20,20,18,.04);
  --sh2:0 2px 8px rgba(20,20,18,.06),0 10px 28px rgba(20,20,18,.06);
  --fd:'Montserrat','Arial Black',Arial,sans-serif;
  --fb:'Carlito','Calibri',Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:0 20px 56px}
a{color:inherit;text-decoration:none}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:4px;border-bottom:1px solid var(--border)}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-left img{height:24px;object-fit:contain}
.logo-div{width:1px;height:18px;background:var(--border);margin:0 2px}
.tim-link{display:inline-flex;align-items:center;gap:5px;font-family:var(--fb);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);padding:4px 10px;border-radius:5px;border:1px solid var(--border);transition:all .18s}
.tim-link:hover{border-color:var(--mustard);color:var(--mustard-d)}
.tim-link svg{width:12px;height:12px}

/* HEADER */
.hdr{margin:20px 0 16px}
.hdr-name{font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--t1);line-height:1.1;margin-bottom:4px}
.hdr-name span{color:var(--mustard-d)}
.hdr-sub{font-size:12px;color:var(--t3);letter-spacing:.3px}
.admin-hdr{margin:16px 0 18px}
.admin-title{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-.8px;color:var(--t1);margin-bottom:3px}
.admin-sub{font-size:12px;color:var(--t3)}

/* COCKPIT */
.cockpit{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{display:flex;align-items:baseline;gap:5px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);box-shadow:var(--sh)}
.chip-num{font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:-.8px;line-height:1}
.chip-lbl{font-size:10px;color:var(--t3);letter-spacing:.3px}
.chip.c-ov .chip-num{color:var(--red)}
.chip.c-td .chip-num{color:var(--orange)}
.chip.c-do .chip-num{color:var(--green)}

/* QUOTE */
.quote-bar{display:flex;gap:12px;align-items:stretch;margin-bottom:22px;padding:13px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.q-accent{width:2px;background:var(--mustard);border-radius:1px;flex-shrink:0}
.q-text{font-family:var(--fd);font-size:12.5px;font-style:italic;color:var(--t2);line-height:1.55}
.q-author{display:block;font-style:normal;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:4px}

/* I AM */
.iam-section{margin-bottom:22px}
.iam-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mustard-d);margin-bottom:10px}
.iam-grid{display:flex;gap:8px;flex-wrap:wrap}
.iam-card{flex:1 1 calc(33.33% - 6px);min-width:175px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;box-shadow:var(--sh);overflow:hidden}
.iam-card.grateful{background:rgba(46,125,82,.04);border-color:rgba(46,125,82,.14)}
.iam-card.feelbest{background:rgba(0,82,135,.04);border-color:rgba(0,82,135,.12)}
.iam-card.blessed{background:var(--mustard-s);border-color:rgba(252,181,40,.20)}
.iam-hdr{display:flex;align-items:center;gap:7px}
.iam-icon{font-size:15px;flex-shrink:0}
.iam-title{font-family:var(--fd);font-size:11.5px;font-weight:700;color:var(--t1);flex:1}
.iam-chev{font-size:9px;color:var(--t3);transition:transform .22s;flex-shrink:0}
.iam-card.open .iam-chev{transform:rotate(180deg)}
.iam-body{max-height:0;overflow:hidden;transition:max-height .28s ease}
.iam-card.open .iam-body{max-height:180px}
.iam-card.open .iam-hdr{margin-bottom:9px}
.iam-list{list-style:none}
.iam-list li{font-size:11px;color:var(--t2);line-height:1.65;padding-left:13px;position:relative}
.iam-list li::before{content:'·';position:absolute;left:2px;color:var(--t3);font-weight:700}

/* TABS */
.person-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.tab-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-family:var(--fb);font-size:13px;font-weight:600;color:var(--t2);transition:all .18s;box-shadow:var(--sh)}
.tab-btn:hover{border-color:var(--mustard);color:var(--mustard-d)}
.tab-btn.active{background:var(--mustard);border-color:var(--mustard);color:#fff;box-shadow:0 3px 10px rgba(252,181,40,.30)}
.tab-av{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.tab-btn:not(.active) .tab-av{background:rgba(30,28,24,.08);color:var(--t2)}
.tab-ct{font-size:10px;background:rgba(255,255,255,.4);padding:1px 6px;border-radius:8px;font-weight:700}
.tab-btn:not(.active) .tab-ct{background:rgba(30,28,24,.07);color:var(--t3)}
.tab-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.person-view{display:none}.person-view.active{display:block}

/* ZONES */
.zone{margin-bottom:20px}
.zone-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.zdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zone-overdue .zdot{background:var(--red)}
.zone-today .zdot{background:var(--orange)}
.zone-week .zdot{background:var(--blue)}
.zone-queue .zdot{background:rgba(30,28,24,.22)}
.zlbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3)}
.zone-overdue .zlbl{color:var(--red)}
.zone-today .zlbl{color:var(--orange)}
.zone-week .zlbl{color:var(--blue)}
.zct{font-size:10px;color:var(--t3);margin-left:3px}
.zempty{font-size:12px;color:var(--t3);font-style:italic;padding:6px 0}

/* TASK CARD */
.tc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;position:relative;box-shadow:var(--sh);transition:box-shadow .18s;overflow:hidden}
.tc:hover{box-shadow:var(--sh2)}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.tc.p1::before{background:var(--orange)}
.tc.p2::before{background:var(--mustard)}
.tc.p3::before{background:rgba(30,28,24,.14)}
.tc.hold::before{background:rgba(30,28,24,.08)}
.tc-r1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:7px}
.tc-name{font-family:var(--fd);font-size:13.5px;font-weight:700;letter-spacing:-.2px;line-height:1.3;flex:1;color:var(--t1)}
.tc-name a:hover{color:var(--mustard-d)}
.tc-cd{font-family:var(--fd);font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.tc-cd.overdue{background:var(--red-s);color:var(--red)}
.tc-cd.today{background:var(--orange-s);color:var(--orange)}
.tc-cd.tomorrow{background:var(--green-s);color:var(--green)}
.tc-cd.days{background:rgba(30,28,24,.06);color:var(--t2)}
.tc-cd.nodue{background:rgba(30,28,24,.04);color:var(--t3)}
.tc-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:9.5px;font-weight:600;letter-spacing:.4px;padding:2px 8px;border-radius:4px}
.tag-p1{background:var(--orange-s);color:var(--orange)}
.tag-p2{background:var(--mustard-s);color:var(--mustard-d)}
.tag-p3{background:rgba(30,28,24,.06);color:var(--t3)}
.tag-hold{background:rgba(30,28,24,.05);color:var(--t3)}
.tag-doing{background:var(--green-s);color:var(--green)}
.tag-next{background:rgba(30,28,24,.06);color:var(--t2)}
.tag-waiting{background:rgba(30,28,24,.05);color:var(--t3)}
.tag-domain{background:rgba(102,0,0,.07);color:var(--maroon)}
.tag-ms{background:rgba(252,181,40,.15);color:var(--mustard-d)}
.tag-ov{background:var(--red-s);color:var(--red);font-weight:700}

/* CP PROGRESS */
.cp-wrap{margin-top:8px}
.cp-row{display:flex;align-items:center;gap:8px}
.cp-bar{flex:1;height:3px;background:rgba(30,28,24,.09);border-radius:2px;overflow:hidden}
.cp-fill{height:100%;border-radius:2px;transition:width .4s ease}
.cp-fill.hi{background:var(--green)}
.cp-fill.md{background:var(--mustard)}
.cp-fill.lo{background:rgba(30,28,24,.22)}
.cp-pct{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--t3);flex-shrink:0;min-width:28px;text-align:right}
.cp-pct.hi{color:var(--green)}.cp-pct.md{color:var(--mustard-d)}.cp-pct.lo{color:var(--t3)}
.cp-label{font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

/* SYNC + FOOTER */
.sync-bar{text-align:center;font-size:11px;color:var(--t3);margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.ftr{text-align:center;margin-top:28px;padding-top:14px;border-top:1px solid var(--border)}
.ftr p{font-size:11px;color:var(--t3);font-style:italic;line-height:1.6}
.ftr span{display:block;font-size:9px;color:rgba(30,28,24,.46);letter-spacing:1px;text-transform:uppercase;margin-top:3px}

@media(max-width:540px){.iam-card{flex:1 1 100%}.cockpit{gap:6px}.chip{padding:5px 12px}}
</style>

// ── HELPERS ────────────────────────────────────────────────────
const NOW=new Date();NOW.setHours(0,0,0,0);
function du(d){if(!d)return null;const x=new Date(d);x.setHours(0,0,0,0);return Math.ceil((x-NOW)/864e5);}
function cdInfo(df){
  if(df===null)return{cls:'nodue',txt:'—'};
  if(df<0)return{cls:'overdue',txt:Math.abs(df)+'d telat'};
  if(df===0)return{cls:'today',txt:'TODAY'};
  if(df===1)return{cls:'tomorrow',txt:'BESOK'};
  return{cls:'days',txt:df+'d lagi'};
}
function pTag(p){
  const lp=(p||'').toLowerCase();
  if(lp==='p1')return['P1','tag-p1'];
  if(lp==='p2')return['P2','tag-p2'];
  if(lp==='p3')return['P3','tag-p3'];
  return['Hold','tag-hold'];
}
function sTag(s){
  const ls=(s||'').toLowerCase();
  if(ls==='doing')return['● Doing','tag-doing'];
  if(ls==='next')return['○ Next','tag-next'];
  return['◌ Waiting','tag-waiting'];
}
function isMilestone(n){return(n||'').includes('🏁');}
function getPersonTasks(key){return TASKS.filter(t=>t.assignee===key);}
function getZone(t){
  const d=du(t.due);
  if(d===null)return'queue';
  if(d<0)return'overdue';
  if(d===0)return'today';
  if(d<=7)return'week';
  return'queue';
}

// ── TASK CARD ────────────────────────────────────────────────────
var SHOW_CP = false; // set true for Yanti's view
function cpBarHTML(cp){
  if(cp===null||cp===undefined)return'';
  const cls=cp>=70?'hi':cp>=30?'md':'lo';
  return`<div class="cp-wrap">
    <div class="cp-row">
      <div class="cp-bar"><div class="cp-fill ${cls}" style="width:${cp}%"></div></div>
      <span class="cp-pct ${cls}">${cp}%</span>
    </div>
    <div class="cp-label">Cowork progress</div>
  </div>`;
}
function tcHTML(t){
  const df=du(t.due);
  const cd=cdInfo(df);
  const[pL,pC]=pTag(t.priority);
  const[sL,sC]=sTag(t.status);
  const priCls=(t.priority||'').toLowerCase();
  const nameStr=t.url?`<a href="${t.url}" target="_blank">${t.name}</a>`:t.name;
  const ms=isMilestone(t.name)?`<span class="tag tag-ms">🏁 Milestone</span>`:'';
  const ovBadge=df!==null&&df<0?`<span class="tag tag-ov">OVERDUE</span>`:'';
  return `<div class="tc ${priCls}">
    <div class="tc-r1">
      <div class="tc-name">${nameStr}</div>
      <div class="tc-cd ${cd.cls}">${cd.txt}</div>
    </div>
    <div class="tc-tags">
      <span class="tag ${pC}">${pL}</span>
      <span class="tag ${sC}">${sL}</span>
      ${t.domain?`<span class="tag tag-domain">${t.domain}`+`</span>`:''}
      ${ms}${ovBadge}
    </div>
    ${SHOW_CP?cpBarHTML(t.cp):''}
  </div>`;
}

// ── URGENCY ZONES ────────────────────────────────────────────────
function renderZones(key){
  const tasks=getPersonTasks(key);
  const Z={overdue:[],today:[],week:[],queue:[]};
  tasks.forEach(t=>Z[getZone(t)].push(t));
  const pOrd={P1:0,P2:1,P3:2,Hold:3};
  const byDue=(a,b)=>{const da=du(a.due)??9999,db=du(b.due)??9999;return da-db;};
  const byPri=(a,b)=>(pOrd[a.priority]??2)-(pOrd[b.priority]??2);
  Z.overdue.sort(byDue);Z.today.sort(byPri);Z.week.sort(byDue);Z.queue.sort(byPri);
  const defs=[
    {k:'overdue',cls:'zone-overdue',lbl:'Overdue',show:Z.overdue.length>0},
    {k:'today',cls:'zone-today',lbl:'Hari Ini',show:true},
    {k:'week',cls:'zone-week',lbl:'Minggu Ini',show:true},
    {k:'queue',cls:'zone-queue',lbl:'Antrian',show:true},
  ];
  return defs.filter(z=>z.show).map(z=>`<div class="zone ${z.cls}">
    <div class="zone-hdr"><div class="zdot"></div><span class="zlbl">${z.lbl}</span><span class="zct">${Z[z.k].length}</span></div>
    ${Z[z.k].length===0?`<div class="zempty">Tidak ada task di zona ini.</div>`:Z[z.k].map(tcHTML).join('')}
  </div>`).join('');
}

// ── COCKPIT ────────────────────────────────────────────────────
function renderCockpit(tasks){
  const ov=tasks.filter(t=>{const d=du(t.due);return d!==null&&d<0;}).length;
  const td=tasks.filter(t=>du(t.due)===0).length;
  const do_=tasks.filter(t=>(t.status||'').toLowerCase()==='doing').length;
  return `<div class="cockpit">
    <div class="chip"><span class="chip-num">${tasks.length}</span><span class="chip-lbl">tasks</span></div>
    <div class="chip c-ov"><span class="chip-num">${ov}</span><span class="chip-lbl">overdue</span></div>
    <div class="chip c-td"><span class="chip-num">${td}</span><span class="chip-lbl">hari ini</span></div>
    <div class="chip c-do"><span class="chip-num">${do_}</span><span class="chip-lbl">doing</span></div>
  </div>`;
}

// ── I AM ────────────────────────────────────────────────────
function renderIAM(iam){
  if(!iam)return'';
  const cards=['grateful','feelbest','blessed'].map(k=>{
    const c=iam[k];
    return`<div class="iam-card ${c.type}" onclick="this.classList.toggle('open')">
      <div class="iam-hdr">
        <span class="iam-icon">${c.icon}</span>
        <span class="iam-title">${c.title}</span>
        <span class="iam-chev">▼</span>
      </div>
      <div class="iam-body"><ul class="iam-list">${c.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>
    </div>`;
  }).join('');
  return`<div class="iam-section"><div class="iam-label">I Am</div><div class="iam-grid">${cards}</div></div>`;
}
